name: CI
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'AUTHORS.md'
      - 'CITATION.cff'
      - 'CONTRIBUTING.md'
      - 'LICENSE.md'
      - 'README.md'
      - '.github/workflows/Documenter.yml'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'AUTHORS.md'
      - 'CITATION.cff'
      - 'CONTRIBUTING.md'
      - 'LICENSE.md'
      - 'README.md'
      - '.github/workflows/Documenter.yml'
      - 'docs/**'

# Needed for julia-actions/cache to delete old caches
permissions:
  actions: write
  contents: read

# Cancel redundant CI tests automatically
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'lts'
          - '1'
          # - 'pre'
          # - 'nightly'
        os:
          - ubuntu-latest
          - macos-15-intel # Intel Chip
          - windows-latest
        arch:
          - x64
        coverage: [false]
        allow_failure: [false]
        include:
          - os: ubuntu-latest
            arch: x64
            version: '1'
            coverage: true
          - os: macOS-latest
            arch: aarch64
            version: 'lts'
            allow_failure: false
          - os: macOS-latest
            arch: aarch64
            version: '1'
            allow_failure: false
          - os: macOS-latest
            arch: aarch64
            version: 'pre'
            allow_failure: true
          - os: ubuntu-latest
            arch: x86
            version: 'pre'
            allow_failure: true
          - os: windows-latest
            arch: x86
            version: 'pre'
            allow_failure: true

    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
        with:
          include-matrix: false
      - uses: julia-actions/julia-buildpkg@latest
      - uses: julia-actions/julia-runtest@latest
        with:
          coverage: ${{ matrix.coverage }}
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.coverage
      - uses: codecov/codecov-action@v5
        if: matrix.coverage
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false  # or true if you want CI to fail when Codecov fails
